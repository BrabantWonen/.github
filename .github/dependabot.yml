# Dependabot configuratie — BrabantWonen organisatie-default
#
# Dit bestand is een TEMPLATE. Kopieer het naar elke repo als
# .github/dependabot.yml en ontkommentarieer de blokken die passen
# bij de tech-stack van die repo.
#
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # GitHub Actions workflows — altijd zinnig om bij te houden
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

